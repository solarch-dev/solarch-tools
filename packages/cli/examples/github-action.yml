# Solarch drift check — code that breaks architecture cannot merge.
#
# Setup:
# 1. Solarch app → Settings → API Keys → create a key.
# 2. Repo Settings → Secrets → add SOLARCH_API_KEY.
# 3. Commit solarch.json at repo root (via `solarch link`).
#
# `solarch diff --ci` emits GitHub annotations; error-level drift
# (rule violation or architecture present but missing in code) fails the job.

name: solarch-drift

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Solarch CLI
        run: npm install -g @solarch/cli

      - name: Login
        run: solarch login --key "$SOLARCH_API_KEY"
        env:
          SOLARCH_API_KEY: ${{ secrets.SOLARCH_API_KEY }}

      - name: Drift check
        run: solarch diff --ci
