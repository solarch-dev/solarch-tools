name: Solarch Drift Check
description: Surface architecture drift in GitHub code-scanning and fail the build when the code drifts from the Solarch architecture.
author: Solarch
branding:
  icon: git-branch
  color: orange

inputs:
  api-key:
    description: Solarch API key (slk_…). Store it as a repository secret (e.g. secrets.SOLARCH_API_KEY).
    required: true
  working-directory:
    description: Path to the repo root that contains solarch.json.
    required: false
    default: "."
  api-url:
    description: Solarch API base URL (override for self-hosted).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Solarch CLI
      shell: bash
      run: npm install -g @solarch/cli

    - name: Sign in
      shell: bash
      run: |
        if [ -n "${{ inputs.api-url }}" ]; then
          solarch login --key "${{ inputs.api-key }}" --api-url "${{ inputs.api-url }}"
        else
          solarch login --key "${{ inputs.api-key }}"
        fi

    - name: Drift check → SARIF
      id: drift
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        solarch diff --sarif > solarch-drift.sarif
        echo "exit=$?" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to code-scanning
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.working-directory }}/solarch-drift.sarif

    - name: Fail on drift errors
      if: steps.drift.outputs.exit != '0'
      shell: bash
      run: |
        echo "::error::Architecture drift detected — see Security → Code scanning for the offending connections."
        exit 1
